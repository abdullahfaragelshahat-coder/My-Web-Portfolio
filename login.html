<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المهندس | دخول الطلاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --success: #00b894;
            --error: #ff7675;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }

        /* حاوية النموذج */
        .container {
            position: relative;
            width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            transition: 0.5s ease-in-out;
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: #fff;
            opacity: 0.5;
            transition: 0.3s;
            font-weight: bold;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 3px solid var(--primary);
        }

        .form-box { display: none; }
        .form-box.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { text-align: center; color: #fff; margin-bottom: 25px; font-weight: 900; }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
        }

        label {
            display: block;
            color: var(--secondary);
            font-size: 13px;
            margin-bottom: 8px;
            margin-right: 5px;
        }

        /* تعقيد كلمة السر */
        .strength-meter {
            height: 4px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.5s;
        }

        /* أزرار */
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #5b4bc4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 12px;
            color: var(--secondary);
        }

        .options a { color: var(--secondary); text-decoration: none; transition: 0.3s; }
        .options a:hover { color: #fff; }

        /* حتة روشة للبرنس */
        .bg-shapes span {
            position: absolute;
            background: var(--primary);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <span style="width: 300px; height: 300px; top: -100px; left: -100px; opacity: 0.3;"></span>
        <span style="width: 250px; height: 250px; bottom: -50px; right: -50px; background: #00cec9; opacity: 0.2;"></span>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">تسجيل دخول</div>
            <div class="tab" onclick="switchTab('register')">حساب جديد</div>
        </div>

        <div id="login" class="form-box active">
            <h2>مرحباً بالمهندس 👑</h2>
            <form>
                <div class="input-group">
                    <label>البريد الإلكتروني أو كود الطالب</label>
                    <input type="text" placeholder="example@prince.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">دخول السيرفر</button>
                <div class="options">
                    <label><input type="checkbox" style="width: auto; margin-left: 5px;"> تذكرني</label>
                    <a href="#">نسيت الباسورد؟</a>
                </div>
            </form>
        </div>

        <div id="register" class="form-box">
            <h2>انضم لجيش العباقرة 📐</h2>
            <form>
                <div class="input-group">
                    <label>الاسم بالكامل</label>
                    <input type="text" placeholder="عبد الله فرج" required>
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" placeholder="mail@tech.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="reg-pass" oninput="checkStrength(this.value)" placeholder="اختر كلمة قوية" required>
                    <div class="strength-meter" id="meter">
                        <div class="strength-bar" id="bar"></div>
                    </div>
                </div>
                <button type="submit" class="btn" style="background: var(--success);">إنشاء الحساب</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            // إخفاء كل الفورمات
            document.querySelectorAll('.form-box').forEach(box => box.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            // إظهار المطلوب
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function checkStrength(pass) {
            let meter = document.getElementById('meter');
            let bar = document.getElementById('bar');
            
            if(pass.length > 0) {
                meter.style.display = 'block';
                let strength = 0;
                if(pass.length > 5) strength += 33;
                if(/[A-Z]/.test(pass)) strength += 33;
                if(/[0-9]/.test(pass) && /[^A-Za-z0-9]/.test(pass)) strength += 34;

                bar.style.width = strength + '%';
                
                if(strength < 40) bar.style.backgroundColor = '#ff7675';
                else if(strength < 80) bar.style.backgroundColor = '#fdcb6e';
                else bar.style.backgroundColor = '#00b894';
            } else {
                meter.style.display = 'none';
            }
        }
    </script>
</body>
</html>
